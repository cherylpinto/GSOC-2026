<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" "http://www.w3.org/Graphics/SVG/1.1/DTD/svg1.1.dtd" [
  <!ENTITY stroke_color "#010101">
  <!ENTITY fill_color "#FFFFFF">
]>
<svg xmlns="http://www.w3.org/2000/svg" width="55" height="55" viewBox="0 0 55 55">
  <g fill="none" stroke-width="3.5">
    <!-- Dots -->
    <circle cx="14" cy="14" r="3.5" fill="&stroke_color;" stroke="&stroke_color;"/>
    <circle cx="41" cy="14" r="3.5" fill="&stroke_color;" stroke="&stroke_color;"/>
    <circle cx="41" cy="41" r="3.5" fill="&stroke_color;" stroke="&stroke_color;"/>
    <circle cx="14" cy="41" r="3.5" fill="&stroke_color;" stroke="&stroke_color;"/>
    <circle cx="27.5" cy="27.5" r="3.5" fill="&stroke_color;" stroke="&stroke_color;"/>
    <!-- Lines connecting dots -->
    <line x1="14" y1="14" x2="41" y2="14" stroke="&stroke_color;"/>
    <line x1="41" y1="14" x2="41" y2="41" stroke="&stroke_color;"/>
    <line x1="41" y1="41" x2="14" y2="41" stroke="&stroke_color;"/>
    <line x1="14" y1="41" x2="14" y2="14" stroke="&stroke_color;"/>
    <!-- Fill area -->
    <rect x="14" y="14" width="27" height="27" fill="&fill_color;" opacity="0.3"/>
  </g>
</svg>
